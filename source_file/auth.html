<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examora – Login / Sign Up</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#080c14;--bg2:#0d1321;--card:#111827;--border:#1e2d45;--accent:#00d4ff;--accent2:#7c3aed;--accent3:#f59e0b;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:70px;background:rgba(8,12,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-links{display:flex;align-items:center;gap:.2rem;}
.nav-links a{color:var(--muted);text-decoration:none;padding:.5rem 1rem;border-radius:8px;font-size:.9rem;font-weight:500;transition:all .2s;}
.nav-links a:hover{color:var(--accent);background:rgba(0,212,255,.08);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:4rem 2rem;position:relative;overflow:hidden;}
.bg-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,212,255,.06),transparent);}
.auth-container{width:100%;max-width:480px;position:relative;z-index:1;}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;position:relative;overflow:hidden;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.auth-header{text-align:center;margin-bottom:2rem;}
.auth-header h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:.4rem;}
.auth-header p{color:var(--muted);font-size:.9rem;}
.tabs{display:flex;background:var(--bg);border-radius:12px;padding:.25rem;margin-bottom:2rem;gap:.25rem;}
.tab{flex:1;text-align:center;padding:.65rem;border-radius:9px;cursor:pointer;font-size:.9rem;font-weight:500;color:var(--muted);transition:all .25s;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.form-section{display:none;}
.form-section.active{display:block;}
.field{margin-bottom:1.25rem;}
label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.4rem;font-weight:500;}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.75rem 1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;transition:border-color .2s,box-shadow .2s;outline:none;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
input::placeholder{color:var(--muted);}
.input-wrap{position:relative;}
.toggle-pw{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;}
.pw-strength{height:4px;border-radius:2px;margin-top:.5rem;background:var(--border);overflow:hidden;}
.pw-strength-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;}
.pw-hints{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.hint{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.3rem;}
.hint.ok{color:var(--green);}
.hint.ok::before{content:'✓';}
.hint:not(.ok)::before{content:'○';}
.btn-submit{width:100%;padding:.9rem;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;margin-top:.5rem;letter-spacing:.02em;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,.3);}
.divider{display:flex;align-items:center;gap:1rem;margin:1.25rem 0;color:var(--muted);font-size:.8rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.alert{padding:.75rem 1rem;border-radius:10px;font-size:.88rem;margin-bottom:1rem;display:none;}
.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.alert.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:480px){.field-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Examora</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="exams.html">Exams</a>
    <a href="pricing.html">Pricing</a>
    <a href="creators.html">Team</a>
    <a href="support.html">Support</a>
  </div>
</nav>
<main>
  <div class="bg-glow"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome to Examora</h1>
        <p>Your gateway to India's top competitive exams</p>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div class="form-section active" id="login-section">
        <div class="alert error" id="login-error"></div>
        <div class="alert success" id="login-success"></div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" placeholder="Enter your password">
            <button class="toggle-pw" onclick="togglePw('login-password',this)">👁</button>
          </div>
        </div>
        <button class="btn-submit" onclick="doLogin()">Login to Examora →</button>
        <div class="divider">or</div>
        <p style="text-align:center;font-size:.88rem;color:var(--muted)">Don't have an account? <span onclick="switchTab('signup')" style="color:var(--accent);cursor:pointer">Sign up free</span></p>
      </div>

      <!-- SIGNUP -->
      <div class="form-section" id="signup-section">
        <div class="alert error" id="signup-error"></div>
        <div class="alert success" id="signup-success"></div>
        <div class="field-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="su-fname" placeholder="SOORAJ">
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="su-lname" placeholder="KRISHNA S">
          </div>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="su-email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="su-phone" placeholder="+91 98765 43210">
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="su-password" placeholder="Create a strong password" oninput="checkPw(this.value)">
            <button class="toggle-pw" onclick="togglePw('su-password',this)">👁</button>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar" style="width:0%"></div></div>
          <div class="pw-hints">
            <span class="hint" id="h-len">8+ characters</span>
            <span class="hint" id="h-up">Uppercase</span>
            <span class="hint" id="h-low">Lowercase</span>
            <span class="hint" id="h-num">Number</span>
            <span class="hint" id="h-sym">Symbol</span>
          </div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="su-cpassword" placeholder="Repeat your password">
            <button class="toggle-pw" onclick="togglePw('su-cpassword',this)">👁</button>
          </div>
        </div>
        <button class="btn-submit" onclick="doSignup()">Create Account →</button>
        <div class="divider">or</div>
        <p style="text-align:center;font-size:.88rem;color:var(--muted)">Already have an account? <span onclick="switchTab('login')" style="color:var(--accent);cursor:pointer">Login</span></p>
      </div>
    </div>
  </div>
</main>
<script>
// ── Tab switching ──
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('login-section').classList.toggle('active',t==='login');
  document.getElementById('signup-section').classList.toggle('active',t==='signup');
}

// ── Toggle password visibility ──
function togglePw(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}

// ── Password strength ──
function checkPw(v){
  const len=v.length>=8,up=/[A-Z]/.test(v),low=/[a-z]/.test(v),num=/[0-9]/.test(v),sym=/[^A-Za-z0-9]/.test(v);
  const score=[len,up,low,num,sym].filter(Boolean).length;
  const bar=document.getElementById('pw-bar');
  const colors=['','#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
  bar.style.width=(score*20)+'%';bar.style.background=colors[score];
  const toggle=(id,ok)=>{document.getElementById(id).classList.toggle('ok',ok);};
  toggle('h-len',len);toggle('h-up',up);toggle('h-low',low);toggle('h-num',num);toggle('h-sym',sym);
}

// ── User store ──
function getUsers(){return JSON.parse(localStorage.getItem('examora_users')||'[]');}
function saveUsers(u){localStorage.setItem('examora_users',JSON.stringify(u));}
function showAlert(id,msg,type){
  const el=document.getElementById(id);
  el.textContent=msg;el.className='alert '+type;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},5000);
}

// ── Sign up ──
function doSignup(){
  const fn=document.getElementById('su-fname').value.trim();
  const ln=document.getElementById('su-lname').value.trim();
  const em=document.getElementById('su-email').value.trim();
  const ph=document.getElementById('su-phone').value.trim();
  const pw=document.getElementById('su-password').value;
  const cp=document.getElementById('su-cpassword').value;
  if(!fn||!ln||!em||!pw||!cp){showAlert('signup-error','Please fill all required fields.','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){showAlert('signup-error','Invalid email address.','error');return;}
  if(pw.length<8){showAlert('signup-error','Password must be at least 8 characters.','error');return;}
  if(!/[A-Z]/.test(pw)){showAlert('signup-error','Password needs at least one uppercase letter.','error');return;}
  if(!/[0-9]/.test(pw)){showAlert('signup-error','Password needs at least one number.','error');return;}
  if(!/[^A-Za-z0-9]/.test(pw)){showAlert('signup-error','Password needs at least one symbol.','error');return;}
  if(pw!==cp){showAlert('signup-error','Passwords do not match.','error');return;}
  const users=getUsers();
  if(users.find(u=>u.email===em)){showAlert('signup-error','An account with this email already exists.','error');return;}
  const user={id:Date.now(),name:fn+' '+ln,email:em,phone:ph,password:pw,created:new Date().toISOString()};
  users.push(user);saveUsers(users);
  showAlert('signup-success','Account created successfully! Logging you in...','success');
  setTimeout(()=>{
    localStorage.setItem('examora_session',JSON.stringify({id:user.id,name:user.name,email:user.email}));
    window.location.href='exams.html';
  },1500);
}

// ── Login ──
function doLogin(){
  const em=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  if(!em||!pw){showAlert('login-error','Please enter your email and password.','error');return;}
  const users=getUsers();
  const user=users.find(u=>u.email===em&&u.password===pw);
  if(!user){showAlert('login-error','Invalid email or password.','error');return;}
  showAlert('login-success','Login successful! Redirecting...','success');
  setTimeout(()=>{
    localStorage.setItem('examora_session',JSON.stringify({id:user.id,name:user.name,email:user.email}));
    window.location.href='exams.html';
  },1200);
}

// ── Check if already logged in ──
if(localStorage.getItem('examora_session')) window.location.href='exams.html';
</script>
</body>
</html>
